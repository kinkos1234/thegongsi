name: cron triggers

# Fly.io 머신이 min_machines_running=0으로 idle 시 정지하므로 in-process
# APScheduler가 실행되지 못한다. 대신 GitHub Actions가 각 시각에 Fly의 admin
# 엔드포인트를 curl해 job을 트리거한다 (auto_start_machines=true로 머신이 깨어남).
#
# 비밀 설정 (Settings → Secrets → Actions):
#   FLY_API_BASE   = https://the-gongsi-api.fly.dev
#   ADMIN_JOBS_TOKEN = <`fly secrets set ADMIN_JOBS_TOKEN=...` 에 쓴 값과 동일>

on:
  schedule:
    # === 매일 (UTC) ===
    # daily_collection은 장중 커버리지를 위해 3회 — KST 10:17 / 14:17 / 18:17
    # (장 시작 후, 오후 중간, 장 마감 직후). DART 접수는 07:00~18:00 KST 피크.
    #
    # `:17`로 오프셋한 이유: GitHub은 공식 문서에서 "schedule event는 매시
    # 정각(:00)에 지연 가능성이 크다"고 명시. 실관측으로도 `0 1/5/9 * * *`
    # 스케줄이 수일 연속 드롭됨 (최근 20회 스케줄 중 01/05/09 UTC 버킷은 2회만
    # 발화). 정각을 피해 분을 :17로 이동시키면 최상위 큐 혼잡을 회피.
    # 22/23 UTC는 evening 한산 시간대라 정각이어도 안정적으로 발화 중.
    - cron: '17 1 * * *'   # KST 10:17 = UTC 01:17 — daily_collection
    - cron: '17 5 * * *'   # KST 14:17 = UTC 05:17 — daily_collection
    - cron: '17 9 * * *'   # KST 18:17 = UTC 09:17 — daily_collection
    # KST 07:00 = UTC 22:00 — daily_ex_dates_scan
    - cron: '0 22 * * *'
    # KST 07:30 = UTC 22:30 — daily_dividend_scan
    - cron: '30 22 * * *'
    # KST 08:00 = UTC 23:00 — daily_earnings_scan
    - cron: '0 23 * * *'
    # === 매주 (UTC) ===
    # KST 월 07:00 = UTC 일 22:00 — weekly_index_sync
    - cron: '0 22 * * 0'
    # KST 토 05:00 = UTC 금 20:00 — weekly_market_refresh (seed + enrich)
    - cron: '0 20 * * 5'
    # KST 일 03:00 = UTC 토 18:00 — weekly_db_backup
    - cron: '0 18 * * 6'
  workflow_dispatch:
    inputs:
      job_id:
        description: '수동 트리거할 job_id (예: daily_earnings_scan)'
        required: true
        type: choice
        options:
          - daily_collection
          - daily_ex_dates_scan
          - daily_dividend_scan
          - daily_earnings_scan
          - weekly_index_sync
          - weekly_market_refresh_seed
          - weekly_market_refresh_enrich
          - weekly_db_backup
          - seed_supply_chains
          - extract_supply_chains
          - graph_ping
          - historical_backfill_30
          - historical_backfill_90
          - backfill_year_gaps
          - backfill_watchlist_governance
          - backfill_watchlist_governance_180d

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve job_id from schedule
        id: resolve
        run: |
          set -e
          # workflow_dispatch: inputs.job_id 사용
          if [ -n "${{ inputs.job_id }}" ]; then
            echo "jobs=${{ inputs.job_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # schedule: github.event.schedule 매핑
          case "${{ github.event.schedule }}" in
            # daily_collection 3회 (KST 10/14/18)
            "0 1 * * *"|"0 5 * * *"|"0 9 * * *")
                            echo "jobs=daily_collection" >> "$GITHUB_OUTPUT" ;;
            "0 22 * * *")   echo "jobs=daily_ex_dates_scan" >> "$GITHUB_OUTPUT" ;;
            "30 22 * * *")  echo "jobs=daily_dividend_scan" >> "$GITHUB_OUTPUT" ;;
            "0 23 * * *")   echo "jobs=daily_earnings_scan" >> "$GITHUB_OUTPUT" ;;
            "0 22 * * 0")   echo "jobs=weekly_index_sync" >> "$GITHUB_OUTPUT" ;;
            # weekly_market_refresh는 seed + enrich 순차
            "0 20 * * 5")   echo "jobs=weekly_market_refresh_seed,weekly_market_refresh_enrich" >> "$GITHUB_OUTPUT" ;;
            "0 18 * * 6")   echo "jobs=weekly_db_backup" >> "$GITHUB_OUTPUT" ;;
            *)              echo "Unknown schedule: ${{ github.event.schedule }}" >&2; exit 1 ;;
          esac

      - name: Trigger Fly admin jobs
        env:
          FLY_API_BASE: ${{ secrets.FLY_API_BASE }}
          ADMIN_JOBS_TOKEN: ${{ secrets.ADMIN_JOBS_TOKEN }}
          JOBS: ${{ steps.resolve.outputs.jobs }}
        run: |
          set -eu
          if [ -z "${FLY_API_BASE:-}" ] || [ -z "${ADMIN_JOBS_TOKEN:-}" ]; then
            echo "FLY_API_BASE or ADMIN_JOBS_TOKEN not set in secrets" >&2
            exit 1
          fi
          IFS=','
          for job in $JOBS; do
            # historical_backfill_N 가상 job → base + ?days=N 쿼리로 분해
            case "$job" in
              historical_backfill_*)
                days="${job#historical_backfill_}"
                url="$FLY_API_BASE/api/admin/jobs/historical_backfill?days=$days"
                ;;
              backfill_watchlist_governance_*)
                days="${job#backfill_watchlist_governance_}"
                days="${days%d}"   # strip optional 'd' suffix
                url="$FLY_API_BASE/api/admin/jobs/backfill_watchlist_governance?days=$days"
                ;;
              *)
                url="$FLY_API_BASE/api/admin/jobs/$job"
                ;;
            esac
            echo "→ triggering $job ($url)"
            resp=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST \
              -H "X-Admin-Token: $ADMIN_JOBS_TOKEN" \
              -H "Content-Type: application/json" \
              "$url")
            cat /tmp/resp.json; echo
            if [ "$resp" != "200" ] && [ "$resp" != "202" ]; then
              echo "trigger failed: HTTP $resp" >&2
              exit 1
            fi
            # Fly 엔드포인트는 job 내부 실패 시에도 HTTP 200을 돌려준다.
            # payload의 result.rc가 0이 아니면 작업이 실패한 것으로 간주.
            rc=$(jq -r '.result.rc // empty' /tmp/resp.json)
            if [ -n "$rc" ] && [ "$rc" != "0" ]; then
              echo "job '$job' failed: rc=$rc (payload stderr_tail 참고)" >&2
              exit 1
            fi
            # weekly_market_refresh의 seed → enrich 사이에 짧게 쉼 (seed가 enrich보다 먼저 끝나도록)
            sleep 5
          done
