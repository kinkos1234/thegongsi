# 한국 대표 공급망 seed 데이터 (2026-04-18)
# 형식: { customer: "고객사", customer_ticker: "티커", suppliers: [{ ticker, name, role }] }
# 이 파일은 "널리 알려진" 관계만 hardcode. 장기 확장은 supply_chain_extractor.py
# 로 공시/뉴스에서 자동 추출하는 경로 (Phase 2).
#
# role: equipment(장비) / material(소재) / component(부품) / foundry / ip
#
# 기준: 2024-2026 공시·사업보고서·뉴스 기반 정사. 변동 가능성 있는 관계는
# 배제. 추가/수정 시 commit message에 근거 URL 명시 권장.

